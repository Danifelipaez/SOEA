name: CI

# Pipeline de integración continua (P1.9 auditoría).
# Corre en cada push y PR: build + tests del backend .NET y build del frontend Angular.

on:
  push:
    branches: [main, Developing]
  pull_request:
    branches: [main, Developing]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore SOEA.sln

      - name: Build
        run: dotnet build SOEA.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test SOEA.sln --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/soea-angular
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/soea-angular/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
